<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinema Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">🎬 CinemaX</div>

        <nav>
            <a href="#">Trang Chủ</a>
            <a href="#">Phim</a>
            <a href="#">Lịch Chiếu</a>
            <a href="#">Liên Hệ</a>
        </nav>

        <button class="login-btn">Đăng Nhập</button>
    </header>

    <section class="hero">

        <div class="hero-content">
            <span class="badge">🔥 PHIM HOT 2025</span>

            <h1>SPACE CADET</h1>

            <p>
                Theo chân Rex Simpson trên hành trình trở thành phi hành gia NASA.
                Một câu chuyện đầy cảm hứng về ước mơ, nghị lực và sự quyết tâm.
            </p>

            <div class="hero-buttons">
                <button class="watch-btn">▶ Xem Ngay</button>
                <button class="info-btn">ℹ Chi Tiết</button>
            </div>
        </div>

        <div class="hero-image">
            <img src="poster.jpg" alt="Movie Poster">
        </div>

    </section>

    <section class="movies">

        <h2>Phim Nổi Bật</h2>

        <div class="movie-list">

            <div class="movie-card">
                <img src="https://picsum.photos/250/350?1">
                <h3>Avatar 3</h3>
            </div>

            <div class="movie-card">
                <img src="https://picsum.photos/250/350?2">
                <h3>Dune 2</h3>
            </div>

            <div class="movie-card">
                <img src="https://picsum.photos/250/350?3">
                <h3>Deadpool</h3>
            </div>

            <div class="movie-card">
                <img src="https://picsum.photos/250/350?4">
                <h3>Joker 2</h3>
            </div>

        </div>

    </section>

</body>
</html>
