<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Khang Cinema</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="overlay"></div>

    <div class="container">
        <div class="logo">
            Khang Cinema
        </div>

        <h2>Đăng nhập</h2>

        <form id="loginForm">
            <div class="input-group">
                <label>Email</label>
                <input
                    id="email"
                    type="email"
                    placeholder="Nhập email"
                >
            </div>

            <div class="input-group">
                <label>Mật khẩu</label>
                <input
                    id="password"
                    type="password"
                    placeholder="Nhập mật khẩu"
                >
            </div>

            <button type="submit">
                Đăng nhập
            </button>

            <div class="register-link">
                Chưa có tài khoản?
                <a href="../register/register.html">Đăng ký</a>
            </div>
        </form>
    </div>

    <script src="./login.js"></script>
</body>
</html>
